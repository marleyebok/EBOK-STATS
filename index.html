<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EBOK — Application en construction</title>
<meta name="description" content="Cette application de la galaxie EBOK Basketball est en construction. Découvrez les autres outils en attendant.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{ --accent:#E8590C; --ink:#1b1a18; --muted:#6d685f; --bg:#f7f3ec; --card:#fff; --line:#e7e0d3; }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Inter',system-ui,sans-serif;color:var(--ink);background:var(--bg);
    min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:48px 22px;gap:8px;
  }
  .logo{font-family:'Anton',sans-serif;font-size:clamp(40px,9vw,72px);letter-spacing:1px;text-transform:uppercase;line-height:1}
  .logo span{color:var(--accent)}
  h1{font-size:clamp(20px,4vw,27px);font-weight:700;margin-top:22px}
  .sub{color:var(--muted);font-size:16px;margin-top:8px}

  .notify-btn{
    margin-top:30px;display:inline-flex;align-items:center;gap:9px;
    background:var(--accent);color:#fff;font-weight:800;font-size:15.5px;
    border:0;border-radius:12px;padding:14px 26px;cursor:pointer;
    box-shadow:0 10px 26px -8px var(--accent);transition:transform .15s,box-shadow .15s;
  }
  .notify-btn:hover{transform:translateY(-2px);box-shadow:0 14px 32px -8px var(--accent)}

  .form{margin-top:26px;display:none;flex-direction:column;gap:10px;width:min(360px,100%)}
  .form.show{display:flex}
  .form-row{display:flex;gap:8px}
  .form input{
    flex:1;font:inherit;font-size:15px;padding:12px 15px;border:1px solid var(--line);
    border-radius:10px;background:var(--card);color:var(--ink);
  }
  .form input:focus{outline:2px solid var(--accent);border-color:transparent}
  .form button{
    background:var(--ink);color:#fff;font:inherit;font-weight:700;border:0;border-radius:10px;
    padding:0 18px;cursor:pointer;
  }
  .form .hint{font-size:12.5px;color:var(--muted)}
  .done{margin-top:26px;color:#1f8f52;font-weight:700;font-size:16px;display:none}
  .done.show{display:block}

  .galaxy{margin-top:64px;display:flex;flex-direction:column;align-items:center;gap:16px;
    padding-top:34px;border-top:1px solid var(--line);width:min(560px,100%)}
  .galaxy p{color:var(--muted);font-size:14.5px;font-weight:600}
  .galaxy a{display:inline-block;transition:transform .15s}
  .galaxy a:hover{transform:translateY(-2px)}
  .galaxy img{height:54px;width:auto;filter:drop-shadow(0 8px 16px rgba(0,0,0,.12))}
  footer{margin-top:30px;font-size:12.5px;color:#9a948a}
</style>
</head>
<body>
  <div class="logo">EBOK <span>APP</span></div>
  <h1>L'application est en construction</h1>
  <p class="sub">On y travaille — elle arrive très bientôt. 🏀</p>

  <button class="notify-btn" id="notifyBtn" type="button">Me prévenir quand l'app est prête</button>

  <form class="form" id="notifyForm">
    <div class="form-row">
      <input id="email" type="email" required placeholder="ton@email.fr" aria-label="Votre e-mail">
      <button type="submit">Valider</button>
    </div>
    <span class="hint">On te préviendra dès l'ouverture. Pas de spam, promis.</span>
  </form>
  <p class="done" id="doneMsg">Merci ! On te préviendra dès que l'application ouvre. 🏀</p>

  <div class="galaxy">
    <p>Découvrez les 10 autres applications de la galaxie EBOK</p>
    <a href="https://ebok-basketball.vercel.app/" aria-label="EBOK Basketball — accueil de la galaxie">
      <img src="/ebokbasketball.png" alt="EBOK Basketball">
    </a>
  </div>

  <footer>Galaxie EBOK Basketball · © 2026</footer>

<script>
  (function(){
    var WAITLIST_API = "https://ebok-dashboard.vercel.app/api/waitlist";
    var btn = document.getElementById('notifyBtn');
    var form = document.getElementById('notifyForm');
    var done = document.getElementById('doneMsg');
    var email = document.getElementById('email');

    btn.addEventListener('click', function(){
      form.classList.add('show');
      btn.style.display = 'none';
      email.focus();
    });

    form.addEventListener('submit', function(e){
      e.preventDefault();
      var value = (email.value || '').trim();
      if(!value) return;
      var submitBtn = form.querySelector('button');
      submitBtn.disabled = true; submitBtn.textContent = '…';
      fetch(WAITLIST_API, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ email: value, source: window.location.hostname })
      }).then(function(r){
        // On confirme même si l'API renvoie une erreur douce : l'e-mail est
        // le plus souvent enregistré, et on ne bloque pas le visiteur.
        form.classList.remove('show');
        done.classList.add('show');
      }).catch(function(){
        // Repli : ouvre le client mail du visiteur.
        window.location.href = 'mailto:marley.ebok@gmail.com?subject=' +
          encodeURIComponent('Me prévenir — ' + window.location.hostname) +
          '&body=' + encodeURIComponent('Préviens-moi à : ' + value);
        form.classList.remove('show');
        done.classList.add('show');
      });
    });
  })();
</script>
</body>
</html>
